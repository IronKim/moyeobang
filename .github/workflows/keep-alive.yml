name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'  # 14분마다 실행
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_URL }}")
          echo "Response status: $STATUS"
