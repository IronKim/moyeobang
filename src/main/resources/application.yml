debug: false
management.endpoints.web.exposure.include: "*"

logging:
  level:
    com.ironkim.moyeobang: DEBUG
    org.springframework.web.servlet: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

spring:
  profiles:
    active: local #default
    group:
      local:
        - common
      prod:
        - common

---

spring:
  config:
    activate:
      on-profile: common
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    properties:
      hibernate:
        show_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        hbm2ddl:
          auto: validate
  servlet:
    multipart:
      max-file-size: 5MB # Max file size.
      max-request-size: 10MB # Max request size.

jwt:
  secret-key: ${JWT_SECRET_KEY}
  expired-time-ms: ${JWT_TOKEN_EXPIRED_TIME_MS}

supabase:
  bucket: ${SUPABASE_BUCKET}
  endpoint: ${SUPABASE_ENDPOINT}
  region: ${SUPABASE_REGION}
  access-key: ${SUPABASE_ACCESS_KEY}
  secret-key: ${SUPABASE_SECRET_KEY}
  public-domain: ${SUPABASE_PUBLIC_DOMAIN}
---
spring:
  config:
    activate:
      on-profile: local
